name: Build learn-boost

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev libssl-dev cmake build-essential pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost openssl@3 cmake pkg-config
          echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          echo "BOOST_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV
          echo "BOOST_INCLUDE_DIR=$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "OPENSSL_ROOT=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "CXXFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "CFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF \
            -DBoost_ROOT=${{ env.BOOST_ROOT }} \
            -DBoost_INCLUDE_DIR=${{ env.BOOST_INCLUDE_DIR }} \
            -DOPENSSL_ROOT=${{ env.OPENSSL_ROOT }} \
            -DCMAKE_PREFIX_PATH=${{ env.BREW_PREFIX }} \
            -DCMAKE_CXX_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_C_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_CXX_STANDARD_INCLUDE_DIRECTORIES=${{ env.BOOST_INCLUDE_DIR }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config Release -j

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: CXXFLAGS="-I${{ env.BOOST_INCLUDE_DIR }}" cmake --build build --config Release -j

  release:
    name: Release on tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev libssl-dev cmake build-essential pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost openssl@3 cmake pkg-config
          echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          echo "BOOST_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV
          echo "BOOST_INCLUDE_DIR=$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "OPENSSL_ROOT=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "CXXFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "CFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF \
            -DBoost_ROOT=${{ env.BOOST_ROOT }} \
            -DBoost_INCLUDE_DIR=${{ env.BOOST_INCLUDE_DIR }} \
            -DOPENSSL_ROOT=${{ env.OPENSSL_ROOT }} \
            -DCMAKE_PREFIX_PATH=${{ env.BREW_PREFIX }} \
            -DCMAKE_CXX_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_C_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_CXX_STANDARD_INCLUDE_DIRECTORIES=${{ env.BOOST_INCLUDE_DIR }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config Release -j

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: CXXFLAGS="-I${{ env.BOOST_INCLUDE_DIR }}" cmake --build build --config Release -j

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p package
          cp build/learn_boost package/
          if [ -f build/libprj_lib.a ]; then cp build/libprj_lib.a package/; fi
          if [ -d build/libnetwork ]; then find build -name "libnetwork*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcrypto ]; then find build -name "libdevcrypto*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcore ]; then find build -name "libdevcore*" -exec cp {} package/ \; ; fi
          cd package
          tar -czf ../learn-boost-${{ runner.os == 'Linux' && 'linux' || 'macos' }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: learn-boost-${{ runner.os == 'Linux' && 'linux' || 'macos' }}.tar.gz