name: Build learn-boost

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev libssl-dev cmake build-essential pkg-config lcov

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost openssl@3 cmake pkg-config
          echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          echo "BOOST_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV
          echo "BOOST_INCLUDE_DIR=$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "OPENSSL_ROOT=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "CXXFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "CFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_GM=OFF -DENABLE_COVERAGE=ON

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF \
            -DBoost_ROOT=${{ env.BOOST_ROOT }} \
            -DBoost_INCLUDE_DIR=${{ env.BOOST_INCLUDE_DIR }} \
            -DOPENSSL_ROOT=${{ env.OPENSSL_ROOT }} \
            -DCMAKE_PREFIX_PATH=${{ env.BREW_PREFIX }} \
            -DCMAKE_CXX_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_C_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_CXX_STANDARD_INCLUDE_DIRECTORIES=${{ env.BOOST_INCLUDE_DIR }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config Debug -j

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: CXXFLAGS="-I${{ env.BOOST_INCLUDE_DIR }}" cmake --build build --config Release -j

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: cd build && ctest --output-on-failure

      - name: Generate coverage
        if: runner.os == 'Linux'
        run: |
          cd build
          mkdir -p coverage
          lcov --capture --directory . --output-file coverage/coverage.info \
            --rc lcov_branch_coverage=1 \
            --rc geninfo_unexecuted_blocks=1 \
            --ignore-errors negative,gcov,unused,empty,mismatch
          lcov --remove coverage/coverage.info '/usr/*' '*/_deps/*' '*/tests/*' \
            --output-file coverage/coverage.info \
            --ignore-errors unused
          lcov --list coverage/coverage.info
          genhtml coverage/coverage.info --output-directory coverage/html
          echo "Coverage summary:"
          lcov --summary coverage/coverage.info

      - name: Upload coverage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/html

  release:
    name: Release on tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev libssl-dev cmake build-essential pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost openssl@3 cmake pkg-config
          echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          echo "BOOST_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV
          echo "BOOST_INCLUDE_DIR=$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "OPENSSL_ROOT=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "CXXFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV
          echo "CFLAGS=-I$(brew --prefix boost)/include" >> $GITHUB_ENV

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF \
            -DBoost_ROOT=${{ env.BOOST_ROOT }} \
            -DBoost_INCLUDE_DIR=${{ env.BOOST_INCLUDE_DIR }} \
            -DOPENSSL_ROOT=${{ env.OPENSSL_ROOT }} \
            -DCMAKE_PREFIX_PATH=${{ env.BREW_PREFIX }} \
            -DCMAKE_CXX_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_C_FLAGS=-I${{ env.BOOST_INCLUDE_DIR }} \
            -DCMAKE_CXX_STANDARD_INCLUDE_DIRECTORIES=${{ env.BOOST_INCLUDE_DIR }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config Release -j

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: CXXFLAGS="-I${{ env.BOOST_INCLUDE_DIR }}" cmake --build build --config Release -j

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p package
          cp build/learn_boost package/
          if [ -f build/libprj_lib.a ]; then cp build/libprj_lib.a package/; fi
          if [ -d build/libnetwork ]; then find build -name "libnetwork*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcrypto ]; then find build -name "libdevcrypto*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcore ]; then find build -name "libdevcore*" -exec cp {} package/ \; ; fi
          if [ -d build/lib ]; then find build/lib -name "*.a" -exec cp {} package/ \; ; fi
          cd package
          tar -czf ../learn-boost-${{ runner.os == 'Linux' && 'linux' || 'macos' }}.tar.gz *

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: learn-boost-linux
          path: learn-boost-linux.tar.gz

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: learn-boost-macos
          path: learn-boost-macos.tar.gz

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: learn-boost-linux
          path: dist/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: learn-boost-macos
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/linux/learn-boost-linux.tar.gz
            dist/macos/learn-boost-macos.tar.gz