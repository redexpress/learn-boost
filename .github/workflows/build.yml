name: Build learn-boost

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev libssl-dev cmake build-essential

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost openssl@3 cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install boost-system boost-filesystem boost-thread openssl --triplet=x64-windows

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Prepare package directory (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package
          cp build/learn_boost package/
          if [ -f build/libprj_lib.a ]; then cp build/libprj_lib.a package/; fi
          if [ -d build/libnetwork ]; then find build -name "libnetwork*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcrypto ]; then find build -name "libdevcrypto*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcore ]; then find build -name "libdevcore*" -exec cp {} package/ \; ; fi

      - name: Prepare package directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item build/Release/learn_boost.exe package/
          if (Test-Path build/Release/prj_lib.lib) { Copy-Item build/Release/prj_lib.lib package/ }
          if (Test-Path build/Release/network.lib) { Copy-Item build/Release/network.lib package/ }
          if (Test-Path build/Release/devcrypto.lib) { Copy-Item build/Release/devcrypto.lib package/ }
          if (Test-Path build/Release/devcore.lib) { Copy-Item build/Release/devcore.lib package/ }

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd package
          tar -czf ../learn-boost-linux.tar.gz *

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        run: |
          cd package
          tar -czf ../learn-boost-macos.tar.gz *

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path package/* -DestinationPath learn-boost-windows.zip

  release:
    name: Release on tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev libssl-dev cmake build-essential

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost openssl@3 cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install boost-system boost-filesystem boost-thread openssl --triplet=x64-windows

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GM=OFF

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Prepare package directory (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package
          cp build/learn_boost package/
          if [ -f build/libprj_lib.a ]; then cp build/libprj_lib.a package/; fi
          if [ -d build/libnetwork ]; then find build -name "libnetwork*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcrypto ]; then find build -name "libdevcrypto*" -exec cp {} package/ \; ; fi
          if [ -d build/libdevcore ]; then find build -name "libdevcore*" -exec cp {} package/ \; ; fi
          cd package
          tar -czf ../learn-boost-${{ runner.os == 'Linux' && 'linux' || 'macos' }}.tar.gz *

      - name: Prepare package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item build/Release/learn_boost.exe package/
          if (Test-Path build/Release/prj_lib.lib) { Copy-Item build/Release/prj_lib.lib package/ }
          if (Test-Path build/Release/network.lib) { Copy-Item build/Release/network.lib package/ }
          if (Test-Path build/Release/devcrypto.lib) { Copy-Item build/Release/devcrypto.lib package/ }
          if (Test-Path build/Release/devcore.lib) { Copy-Item build/Release/devcore.lib package/ }
          Compress-Archive -Path package/* -DestinationPath learn-boost-windows.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: learn-boost-linux
          path: learn-boost-linux.tar.gz

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: learn-boost-macos
          path: learn-boost-macos.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: learn-boost-windows
          path: learn-boost-windows.zip

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: learn-boost-linux
          path: dist/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: learn-boost-macos
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: learn-boost-windows
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/linux/learn-boost-linux.tar.gz
            dist/macos/learn-boost-macos.tar.gz
            dist/windows/learn-boost-windows.zip